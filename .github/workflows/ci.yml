name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Tests de auth-service ─────────────────────────────────
  test-auth-service:
    name: 🧪 Test Auth Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        # Descarga tu código en la VM de GitHub

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auth-service/package-lock.json
          # cache: reutiliza node_modules si package.json no cambió
          # ahorra 30-60 segundos en cada run

      - name: Instalar dependencias
        working-directory: auth-service
        run: npm ci
        # npm ci es más estricto que npm install
        # usa exactamente las versiones de package-lock.json

      - name: Correr tests
        working-directory: auth-service
        run: npm test

  # ── Job 2: Tests de tasks-service ────────────────────────────────
  test-tasks-service:
    name: 🧪 Test Tasks Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependencias
        working-directory: tasks-service
        run: dotnet restore

      - name: Build
        working-directory: tasks-service
        run: dotnet build --no-restore

      - name: Correr tests
        working-directory: tasks-service
        run: dotnet test --no-build

  # ── Job 3: Build y push de imágenes Docker ────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    # Solo corre si los dos jobs de tests pasaron
    needs: [test-auth-service, test-tasks-service]
    # Solo en push a main, no en pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN es un token automático que GitHub genera
          # para cada workflow — no necesitas configurar nada

      - name: Build y push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-auth:latest
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-auth:${{ github.sha }}
          # github.sha es el hash del commit — cada imagen queda
          # taggeada con el commit exacto que la generó

      - name: Build y push tasks-service
        uses: docker/build-push-action@v5
        with:
          context: ./tasks-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-tasks:latest
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-tasks:${{ github.sha }}

      - name: Build y push notifications-service
        uses: docker/build-push-action@v5
        with:
          context: ./notifications-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-notifications:latest
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-notifications:${{ github.sha }}

      - name: Build y push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-gateway:latest
            ghcr.io/${{ github.repository_owner | lower }}/taskflow-gateway:${{ github.sha }}

      - name: Resumen del pipeline
        run: |
          echo "## 🚀 Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Imágenes publicadas:**" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner | lower }}/taskflow-auth:latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner | lower }}/taskflow-tasks:latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner | lower }}/taskflow-notifications:latest" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository_owner | lower }}/taskflow-gateway:latest" >> $GITHUB_STEP_SUMMARY